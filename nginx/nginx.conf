events {}

http {
  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name lynkr.club www.lynkr.club;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name lynkr.club www.lynkr.club;

    ssl_certificate     /etc/letsencrypt/live/lynkr.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lynkr.club/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # BACKEND API (Frontend calls /api/*)
    # When proxy_pass has no trailing slash, nginx preserves the full URI
    # /api/auth/signup -> http://backend:8000/api/auth/signup
    location /api {
      proxy_pass http://backend:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      
      # Increase timeouts for long-running requests
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      
      # Don't add CORS headers here - let backend handle CORS
    }

    # BACKEND (Alternative path if needed)
    location /backend/ {
      proxy_pass http://backend:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
    }

    # FRONTEND (All other requests)
    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
    }
  }
}
