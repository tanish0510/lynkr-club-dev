events {}

http {

  server_tokens off;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  proxy_buffers 16 16k;
  proxy_buffer_size 32k;

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name lynkr.club www.lynkr.club;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name lynkr.club www.lynkr.club;

    ssl_certificate     /etc/letsencrypt/live/lynkr.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lynkr.club/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20M;

    ############################################
    # UPLOADED IMAGES (proxied to backend static)
    ############################################
    location /api/uploads/ {
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    ############################################
    # API ROUTES
    ############################################
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://backend:8000;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    ############################################
    # BACKEND (optional internal path)
    ############################################
    location /backend/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://backend:8000/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    ############################################
    # FRONTEND (SPA fallback)
    ############################################
    location / {
      proxy_pass http://frontend:80;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      proxy_intercept_errors on;
      error_page 404 = @spa_fallback;
    }

    # Named locations cannot have URI in proxy_pass; use rewrite then proxy without URI
    location @spa_fallback {
      rewrite ^ /index.html break;
      proxy_pass http://frontend:80;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
