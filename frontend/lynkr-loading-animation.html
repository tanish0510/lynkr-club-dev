  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: hsl(0 0% 2%);
      color: hsl(0 0% 100%);
      font-family: 'Manrope', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
    }
    .logo-wrap {
      width: 180px;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.05));
    }
    .logo-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .logo-wrap path.stroke {
      fill: none;
      stroke: #EDEDED;
      stroke-width: 1.2;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: draw 1.8s ease-in-out forwards;
    }
    .logo-wrap path.fill {
      fill: #EDEDED;
      opacity: 0;
      animation: fillIn 0.3s ease-in-out 1.8s forwards;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fillIn {
      to { opacity: 1; }
    }
    .logo-wrap.pulse {
      animation: pulse 4s ease-in-out 2.1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.98; }
      50% { transform: scale(1.01); opacity: 1; }
    }
    .progress-track {
      height: 6px;
      width: 128px;
      border-radius: 9999px;
      background: rgba(59, 130, 246, 0.2);
      overflow: hidden;
      animation: trackPulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes trackPulse {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }
    .progress-thumb {
      height: 100%;
      width: 33.33%;
      border-radius: 9999px;
      background: hsl(217 91% 60%);
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-10%); }
      50% { transform: translateX(220%); }
      100% { transform: translateX(-10%); }
    }
    .label {
      font-size: 0.875rem;
      color: hsl(0 0% 64%);
      text-align: center;
    }
  </style>
</head>
