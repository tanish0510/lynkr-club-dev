    <!-- Dark theme and body background for /app* before React loads (avoids white flash on direct /app/dashboard) -->
    <script>
      var mode = 'dark';
      try { mode = localStorage.getItem('lynkr_color_mode') || 'dark'; } catch(e) {}
      if (mode === 'dark') document.documentElement.classList.add('dark');
      document.documentElement.setAttribute('data-theme', mode);
    </script>
    <style>html.dark body{background:hsl(0,0%,2%);color:hsl(0,0%,100%);}html:not(.dark) body{background:hsl(0,0%,98%);color:hsl(0,0%,8%);}</style>
