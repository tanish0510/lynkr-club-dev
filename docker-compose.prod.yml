services:
  mongodb:
    image: mongo:7.0
    container_name: lynkr-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME:-lynkr_db}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lynkr-network

  backend:
    image: ${DOCKER_HUB_USERNAME:-tanish0510}/lynkr-backend:latest
    container_name: lynkr-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-lynkr_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDER_EMAIL: ${SENDER_EMAIL:-noreply@lynkr.club}
      FRONTEND_URL: ${FRONTEND_URL:-https://lynkr.club}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://lynkr.club,https://www.lynkr.club}
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lynkr-network

  frontend:
    image: ${DOCKER_HUB_USERNAME:-tanish0510}/lynkr-frontend:latest
    container_name: lynkr-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - lynkr-network

  mongo-express:
    image: mongo-express:latest
    container_name: lynkr-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lynkr-network

  nginx:
    image: nginx:alpine
    container_name: lynkr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - lynkr-network

networks:
  lynkr-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
