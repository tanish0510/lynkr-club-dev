services:
  postgres:
    image: postgres:16-alpine
    container_name: lynkr-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lynkr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lynkr}
      POSTGRES_DB: ${POSTGRES_DB:-lynkr_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lynkr} -d ${POSTGRES_DB:-lynkr_db}"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - lynkr-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lynkr-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lynkr-network

  backend:
    image: ${DOCKER_HUB_USERNAME:-tanish0510}/lynkr-backend:latest
    container_name: lynkr-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lynkr}:${POSTGRES_PASSWORD:-lynkr}@postgres:5432/${POSTGRES_DB:-lynkr_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDER_EMAIL: ${SENDER_EMAIL:-noreply@lynkr.club}
      FRONTEND_URL: ${FRONTEND_URL:-https://lynkr.club}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://lynkr.club,https://www.lynkr.club}
    env_file:
      - .env
    volumes:
      - catalog_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lynkr-network

  frontend:
    image: ${DOCKER_HUB_USERNAME:-tanish0510}/lynkr-frontend:latest
    container_name: lynkr-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - lynkr-network

  nginx:
    image: nginx:alpine
    container_name: lynkr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - lynkr-network

networks:
  lynkr-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  catalog_uploads:
    driver: local
